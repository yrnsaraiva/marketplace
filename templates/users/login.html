{% extends "base.html" %}
{% block title %}Entrar{% endblock %}

{% block content %}
<main class="pt-24 pb-20 px-4 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl p-8 shadow-sm border border-surface-container-low">
            <h1 class="text-2xl font-extrabold text-on-surface mb-2">Bem-vindo de volta</h1>
            <p class="text-on-surface-variant text-sm mb-8">Entre na sua conta MozClassificados</p>

            <form method="POST">
                {% csrf_token %}
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-on-surface mb-2">Utilizador</label>
                        <input type="text" name="username" required autofocus
                               class="w-full px-4 py-3 rounded-xl border border-outline-variant focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20"
                               placeholder="O seu utilizador"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-on-surface mb-2">Password</label>
                        <input type="password" name="password" required
                               class="w-full px-4 py-3 rounded-xl border border-outline-variant focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20"
                               placeholder="••••••••"/>
                    </div>
                    {% if form.errors %}
                    <p class="text-error text-sm">Utilizador ou password incorrectos.</p>
                    {% endif %}
                </div>
                <button type="submit"
                        class="w-full mt-6 py-3 rounded-xl bg-primary text-on-primary font-semibold hover:bg-primary/90 transition-all shadow-md">
                    Entrar
                </button>
            </form>

            <p class="text-center text-sm text-on-surface-variant mt-6">
                Não tem conta?
                <a href="{% url 'registo' %}" class="text-primary font-semibold hover:underline">Registar</a>
            </p>
        </div>
    </div>
</main>
{% endblock %}
