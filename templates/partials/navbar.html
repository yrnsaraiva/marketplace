{% load static %}
<nav class="fixed top-0 w-full flex justify-between items-center px-6 py-4 max-w-screen-2xl mx-auto bg-[#f9f9f9]/80 backdrop-blur-md shadow-sm z-50">
    <div class="flex items-center gap-8">
        <a href="{% url 'home' %}" class="text-xl font-black text-[#1a1c1c] tracking-tighter">MozClassificados</a>
        <form method="GET" action="{% url 'anuncio-pesquisa' %}" class="hidden md:flex items-center bg-surface-container-low rounded-full px-4 py-2 w-96 focus-within:ring-2 ring-primary/20 transition-all">
            <span class="material-symbols-outlined text-outline">search</span>
            <input class="bg-transparent border-none focus:outline-none text-sm w-full ml-2 text-on-surface placeholder:text-on-surface-variant/60"
                   placeholder="O que procuras hoje?" type="text" name="search"
                   value="{{ request.GET.search }}"/>
        </form>
    </div>
    <div class="flex items-center gap-4">
        {% if user.is_authenticated %}
            <a href="{% url 'anuncio-publicar' %}" class="hidden md:flex items-center gap-2 bg-primary text-on-primary px-5 py-2 rounded-full font-semibold hover:bg-primary/90 transition-all shadow-sm">
                <span class="material-symbols-outlined text-base">add</span>
                Publicar Anúncio
            </a>
            <div class="relative group">
                <div class="p-2 rounded-full hover:bg-surface-container-high transition-colors cursor-pointer flex items-center gap-2">
                    {% if user.foto_perfil %}
                        <img src="{{ user.foto_perfil.url }}" class="w-8 h-8 rounded-full object-cover"/>
                    {% else %}
                        <span class="material-symbols-outlined text-on-surface">account_circle</span>
                    {% endif %}
                    <span class="hidden md:block text-sm font-medium">{{ user.username }}</span>
                </div>
                <div class="absolute right-0 top-full mt-2 w-48 bg-white rounded-xl shadow-lg border border-surface-container-low py-2 hidden group-hover:block z-50">
                    <a href="{% url 'dashboard' %}" class="flex items-center gap-2 px-4 py-2 text-sm hover:bg-surface-container-low transition-colors">
                        <span class="material-symbols-outlined text-base">dashboard</span> Painel
                    </a>
                    <a href="{% url 'perfil' %}" class="flex items-center gap-2 px-4 py-2 text-sm hover:bg-surface-container-low transition-colors">
                        <span class="material-symbols-outlined text-base">person</span> Perfil
                    </a>
                    <hr class="my-1 border-surface-container-low"/>
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-error hover:bg-error-container/20 transition-colors">
                            <span class="material-symbols-outlined text-base">logout</span> Sair
                        </button>
                    </form>
                </div>
            </div>
        {% else %}
            <a href="{% url 'login' %}" class="text-sm font-medium text-on-surface hover:text-primary transition-colors">Entrar</a>
            <a href="{% url 'anuncio-publicar' %}" class="hidden md:flex items-center gap-2 bg-primary-container text-on-primary-container px-6 py-2.5 rounded-full font-bold hover:scale-[1.02] transition-all">
                <span class="material-symbols-outlined text-base">add</span>
                Publicar Anúncio
            </a>
        {% endif %}
    </div>
</nav>
