{% load static %}
<nav class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-sm">
    <div class="max-w-screen-2xl mx-auto flex justify-between items-center px-6 py-3 gap-4">

        <!-- Logo -->
        <div class="flex items-center gap-6 flex-shrink-0">
            <a href="{% url 'home' %}" class="text-xl font-black text-on-surface tracking-tighter hover:text-primary transition-colors">
                <img src="{% static 'img/zonal_logo.png' %}" alt="" width="150">
            </a>
        </div>

        <!-- Acções -->
        <div class="flex items-center gap-3">

            {% if user.is_authenticated %}

                <!-- Botão publicar -->
                <a href="{% url 'anuncio-publicar' %}"
                   class="hidden md:flex items-center gap-1.5 bg-primary text-on-primary px-4 py-2 rounded-full text-sm font-semibold hover:bg-primary/90 transition-all shadow-sm">
                    <span class="material-symbols-outlined text-base">add</span>
                    Publicar
                </a>

                <!-- Dropdown utilizador — abre com click para acessibilidade mobile -->
                <div class="relative" id="user-menu">
                    <button onclick="toggleMenu()"
                            class="flex items-center gap-2 p-1.5 rounded-full hover:bg-surface-container-high transition-colors"
                            aria-haspopup="true" aria-expanded="false" id="user-menu-btn">
                        {% if user.foto_perfil %}
                            <img src="{{ user.foto_perfil.url }}"
                                 class="w-8 h-8 rounded-full object-cover ring-2 ring-primary/20"
                                 alt="{{ user.get_full_name|default:user.username }}"/>
                        {% else %}
                            <span class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                                <span class="material-symbols-outlined text-primary text-lg">person</span>
                            </span>
                        {% endif %}
                        <span class="hidden md:block text-sm font-medium max-w-[120px] truncate">
                            {{ user.get_full_name|default:user.username }}
                        </span>
                        <span class="material-symbols-outlined text-outline text-sm hidden md:block">expand_more</span>
                    </button>

                    <div id="user-dropdown"
                         class="hidden absolute right-0 top-full mt-2 w-52 bg-surface-container-lowest rounded-2xl shadow-xl border border-surface-container-low py-2 z-50"
                         role="menu">
                        <div class="px-4 py-2 border-b border-surface-container-low mb-1">
                            <p class="text-sm font-semibold text-on-surface truncate">{{ user.get_full_name|default:user.username }}</p>
                            <p class="text-xs text-on-surface-variant truncate">{{ user.email }}</p>
                        </div>
                        <a href="{% url 'dashboard' %}" role="menuitem"
                           class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-surface-container-low transition-colors">
                            <span class="material-symbols-outlined text-base text-primary">dashboard</span> Painel
                        </a>
                        <a href="{% url 'meus-anuncios' %}" role="menuitem"
                           class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-surface-container-low transition-colors">
                            <span class="material-symbols-outlined text-base text-primary">inventory_2</span> Meus anúncios
                        </a>
                        <a href="{% url 'favoritos' %}" role="menuitem"
                           class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-surface-container-low transition-colors">
                            <span class="material-symbols-outlined text-base text-primary">favorite</span> Favoritos
                        </a>
                        <a href="{% url 'perfil' %}" role="menuitem"
                           class="flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-surface-container-low transition-colors">
                            <span class="material-symbols-outlined text-base text-primary">manage_accounts</span> Perfil
                        </a>
                        <hr class="my-1 border-surface-container-low"/>
                        <form method="POST" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" role="menuitem"
                                    class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-error hover:bg-error-container/30 transition-colors">
                                <span class="material-symbols-outlined text-base">logout</span> Sair
                            </button>
                        </form>
                    </div>
                </div>

            {% else %}

                <a href="{% url 'login' %}"
                   class="text-sm font-medium text-on-surface hover:text-primary transition-colors">
                    Entrar
                </a>
                <a href="{% url 'anuncio-publicar' %}"
                   class="hidden lg:flex items-center gap-1.5 border-2 border-primary text-primary px-4 py-2 rounded-full text-sm font-semibold hover:bg-primary hover:text-on-primary transition-all">
                    <span class="material-symbols-outlined text-base">add</span>
                    Publicar
                </a>

            {% endif %}
        </div>
    </div>

</nav>

<script>
    function toggleMenu() {
        const dd = document.getElementById('user-dropdown');
        const btn = document.getElementById('user-menu-btn');
        const hidden = dd.classList.toggle('hidden');
        btn.setAttribute('aria-expanded', !hidden);
    }
    // Fechar ao clicar fora
    document.addEventListener('click', (e) => {
        const menu = document.getElementById('user-menu');
        if (menu && !menu.contains(e.target)) {
            document.getElementById('user-dropdown')?.classList.add('hidden');
            document.getElementById('user-menu-btn')?.setAttribute('aria-expanded', 'false');
        }
    });
</script>
